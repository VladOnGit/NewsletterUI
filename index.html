<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter UI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class = "container-Signup">
        <i class="far fa-envelope-open"></i>
        <h1>Join Our Newsletter</h1>
        <p>Get the last updates and offers delivered to your inbox.</p>
        <form>
            <div class="input-groups">
                <i class ="far fa-envelope"></i>
                <input type="email" placeholder="Enter your email" required>
            </div>
                <button type="submit">Subscribe</button>
        </form>
            <div class="benefits">
                <i class="far fa-check-circle"></i>
                <span>Get the latest news and updates</span>
            </div>
            <div class="benefits">
                <i class="far fa-check-circle"></i>
                <span>Access exclusive offers and deals</span>
            </div>
            <div class="benefits">
                <i class="far fa-check-circle"></i>
                <span>Receive personalized recommendations</span>
            </div>

        </div>
    
</body>
</html>
